<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=overlays-content">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lilypad">
<meta name="theme-color" content="#8BA5EB">
<title>Lilypad Shake</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="assets/ui/lily_bg.png">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="stage">
    <video id="camera" autoplay muted playsinline></video>
    <canvas id="gl"></canvas>
    <div id="ui"></div>
  </div>
  <div id="rotatePrompt">
    <div class="icon">🔄</div>
    <div>Girá el dispositivo</div>
    <span>Jugá con la pantalla en horizontal</span>
  </div>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker
          .register('./service-worker.js?v=43', { scope: './' })
          .then(() => navigator.serviceWorker.ready)
          .then(() => {
            document.documentElement.dataset.offlineReady = 'true';
            window.dispatchEvent(new Event('lilypad-offline-ready'));
          })
          .catch(() => {});
      }, { once: true });
    }
  </script>
  <script type="module" src="js/game.js?v=43"></script>
</body>
</html>
