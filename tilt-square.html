<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0b1020">
  <title>Prueba de inclinación</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Arial, Helvetica, sans-serif;
      background: #0b1020;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow: hidden;
      background: #0b1020;
    }

    body {
      display: grid;
      place-items: center;
      touch-action: manipulation;
    }

    #statusPanel {
      position: fixed;
      z-index: 2;
      top: max(24px, env(safe-area-inset-top));
      left: 50%;
      width: min(88vw, 540px);
      transform: translateX(-50%);
      text-align: center;
    }

    #status {
      margin: 0 0 14px;
      color: #e9f2ff;
      font-size: clamp(16px, 2vw, 24px);
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    #actions {
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 13px 20px;
      color: #ffffff;
      background: #1976f3;
      font: inherit;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.05em;
      touch-action: manipulation;
    }

    button[hidden] {
      display: none;
    }

    button:disabled {
      opacity: 0.55;
    }

    #square {
      position: fixed;
      z-index: 1;
      top: 50%;
      width: min(28vw, 250px);
      aspect-ratio: 1;
      border-radius: 0;
      opacity: 0;
      background: #1677ff;
      pointer-events: none;
      transition: transform 320ms cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 100ms ease-out;
      will-change: transform, opacity;
    }

    #square.left {
      left: 0;
      transform: translate3d(-110%, -50%, 0);
    }

    #square.right {
      right: 0;
      transform: translate3d(110%, -50%, 0);
    }

    #square.visible {
      opacity: 1;
      pointer-events: auto;
    }

    #square.visible.left {
      transform: translate3d(0, -50%, 0);
    }

    #square.visible.right {
      transform: translate3d(0, -50%, 0);
    }
  </style>
</head>
<body>
  <section id="statusPanel">
    <p id="status">Tocá para activar la inclinación</p>
    <div id="actions">
      <button id="activate" type="button">ACTIVAR</button>
    </div>
  </section>
  <button id="square" type="button" aria-label="Ocultar cuadrado"></button>

  <script>
    (() => {
      const ENTER_THRESHOLD = 0.018;
      const EXIT_THRESHOLD = 0.011;
      const TAP_REARM_THRESHOLD = 0.015;
      const SQUARE_VISIBLE_MS = 1200;
      const REFERENCE_STABLE_DELTA = 0.01;
      const REFERENCE_SETTLE_MS = 180;
      const FIRST_TILT_HOLD_MS = 35;
      const OPPOSITE_TILT_HOLD_MS = 140;
      const NEUTRAL_HOLD_MS = 45;

      const activateButton = document.getElementById('activate');
      const squareElement = document.getElementById('square');
      const statusElement = document.getElementById('status');
      const query = new URLSearchParams(window.location.search);
      const monitorEndpoint = query.get('monitor');
      const monitorToken = query.get('monitorToken');

      let centerTilt = null;
      let referenceCandidate = null;
      let referenceCandidateSince = null;
      let activeDirection = 0;
      let pendingDirection = 0;
      let pendingDirectionSince = null;
      let neutralSince = null;
      let started = false;
      let squareVisible = false;
      let squareShowSequence = 0;
      let squareHideTimer = null;
      let tapRearmRequested = false;
      let lastTelemetryAt = 0;

      function report(eventName, payload, force) {
        if (!monitorEndpoint || !monitorToken) return;
        const now = performance.now();
        if (!force && now - lastTelemetryAt < 160) return;
        lastTelemetryAt = now;
        const body = JSON.stringify({
          token: monitorToken,
          event: eventName,
          time: Math.round(now),
          ...payload,
        });
        const blob = new Blob([body], { type: 'text/plain' });
        if (navigator.sendBeacon && navigator.sendBeacon(monitorEndpoint, blob)) return;
        fetch(monitorEndpoint, { method: 'POST', body, keepalive: true, mode: 'no-cors' }).catch(() => {});
      }

      function setStatus(message) {
        statusElement.textContent = message;
      }

      function beginAutomaticReference() {
        centerTilt = null;
        referenceCandidate = null;
        referenceCandidateSince = null;
        activeDirection = 0;
        pendingDirection = 0;
        pendingDirectionSince = null;
        neutralSince = null;
        tapRearmRequested = false;
        hideSquare();
        setStatus('Incliná apenas hacia un lado');
        report('square-reference-pending', {}, true);
      }

      function screenXFromGravity(gravityX, gravityY) {
        const angle = window.screen.orientation?.angle ?? window.orientation ?? 0;
        switch (angle) {
          case 90:
            return -gravityY;
          case -90:
          case 270:
            return gravityY;
          case 180:
            return gravityX;
          default:
            return -gravityX;
        }
      }

      function clearSquareHideTimer() {
        if (squareHideTimer === null) return;
        window.clearTimeout(squareHideTimer);
        squareHideTimer = null;
      }

      function showSquare(side) {
        clearSquareHideTimer();
        tapRearmRequested = false;
        const showSequence = ++squareShowSequence;
        squareElement.classList.remove('visible', 'left', 'right');
        squareElement.classList.add(side);
        squareVisible = true;
        void squareElement.offsetWidth;
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            if (squareVisible && showSequence === squareShowSequence) squareElement.classList.add('visible');
          });
        });
        squareHideTimer = window.setTimeout(() => {
          squareHideTimer = null;
          hideSquare();
        }, SQUARE_VISIBLE_MS);
        report('square-show', { side, center: centerTilt }, true);
      }

      function hideSquare() {
        clearSquareHideTimer();
        squareShowSequence++;
        squareElement.classList.remove('visible');
        squareVisible = false;
        report('square-hide', {}, true);
      }

      function hideSquareFromTap() {
        tapRearmRequested = true;
        neutralSince = null;
        clearPendingDirection();
        hideSquare();
        report('square-tap', { activeDirection }, true);
      }

      function clearPendingDirection() {
        pendingDirection = 0;
        pendingDirectionSince = null;
      }

      function captureAutomaticReference(tilt, timestamp) {
        if (referenceCandidate === null || Math.abs(tilt - referenceCandidate) > REFERENCE_STABLE_DELTA) {
          referenceCandidate = tilt;
          referenceCandidateSince = timestamp;
          return false;
        }
        referenceCandidate += (tilt - referenceCandidate) * 0.25;
        if (timestamp - referenceCandidateSince < REFERENCE_SETTLE_MS) return false;
        centerTilt = referenceCandidate;
        referenceCandidate = null;
        referenceCandidateSince = null;
        setStatus('Listo: incliná apenas hacia un lado');
        report('square-ready', { center: centerTilt }, true);
        return true;
      }

      function triggerAfterHold(direction, timestamp) {
        const isOppositeDirection = activeDirection !== 0 && direction !== activeDirection;
        if (activeDirection !== 0 && !isOppositeDirection) {
          clearPendingDirection();
          return;
        }

        if (pendingDirection !== direction) {
          pendingDirection = direction;
          pendingDirectionSince = timestamp;
          return;
        }

        const requiredHold = isOppositeDirection ? OPPOSITE_TILT_HOLD_MS : FIRST_TILT_HOLD_MS;
        if (timestamp - pendingDirectionSince < requiredHold) return;
        activeDirection = direction;
        neutralSince = null;
        clearPendingDirection();
        showSquare(direction > 0 ? 'right' : 'left');
      }

      function handleTilt(tilt, timestamp) {
        if (centerTilt === null) {
          captureAutomaticReference(tilt, timestamp);
          return;
        }

        const delta = tilt - centerTilt;
        const magnitude = Math.abs(delta);
        const neutralThreshold = tapRearmRequested ? TAP_REARM_THRESHOLD : EXIT_THRESHOLD;
        if (magnitude <= neutralThreshold) {
          if (neutralSince === null) neutralSince = timestamp;
          if (timestamp - neutralSince >= NEUTRAL_HOLD_MS) {
            const shouldHideSquare = activeDirection !== 0 || squareVisible;
            activeDirection = 0;
            tapRearmRequested = false;
            clearPendingDirection();
            if (shouldHideSquare) hideSquare();
          }
          if (!squareVisible && activeDirection === 0) centerTilt += delta * 0.04;
          report('square-tilt', { tilt, center: centerTilt, delta, activeDirection, pendingDirection }, false);
          return;
        }

        neutralSince = null;
        if (magnitude < ENTER_THRESHOLD) {
          clearPendingDirection();
          report('square-tilt', { tilt, center: centerTilt, delta, activeDirection, pendingDirection }, false);
          return;
        }

        const direction = delta > 0 ? 1 : -1;
        triggerAfterHold(direction, timestamp);
        report('square-tilt', { tilt, center: centerTilt, delta, activeDirection, pendingDirection }, false);
      }

      function onDeviceMotion(event) {
        const totalAcceleration = event.accelerationIncludingGravity;
        if (!totalAcceleration || !Number.isFinite(totalAcceleration.x) || !Number.isFinite(totalAcceleration.y)) return;
        const linearAcceleration = event.acceleration;
        const gravityX = Number.isFinite(linearAcceleration?.x)
          ? totalAcceleration.x - linearAcceleration.x
          : totalAcceleration.x;
        const gravityY = Number.isFinite(linearAcceleration?.y)
          ? totalAcceleration.y - linearAcceleration.y
          : totalAcceleration.y;
        const screenTilt = screenXFromGravity(gravityX, gravityY) / 9.8;
        if (Number.isFinite(screenTilt)) handleTilt(screenTilt, performance.now());
      }

      async function activate() {
        if (started) return;
        activateButton.disabled = true;
        try {
          const motionEvent = window.DeviceMotionEvent;
          if (!motionEvent) throw new Error('El navegador no expone sensores de movimiento');
          if (typeof motionEvent.requestPermission === 'function') {
            const permission = await motionEvent.requestPermission();
            if (permission !== 'granted') throw new Error('Permiso de movimiento rechazado');
          }
          started = true;
          window.addEventListener('devicemotion', onDeviceMotion, { passive: true });
          activateButton.hidden = true;
          beginAutomaticReference();
          report('square-start', {}, true);
        } catch (error) {
          activateButton.disabled = false;
          setStatus(error.message || 'No se pudo activar la inclinación');
          report('square-error', { message: String(error.message || error) }, true);
        }
      }

      activateButton.addEventListener('click', activate);
      squareElement.addEventListener('click', hideSquareFromTap);
      window.addEventListener('orientationchange', beginAutomaticReference);
      report('square-boot', {}, true);
    })();
  </script>
</body>
</html>
